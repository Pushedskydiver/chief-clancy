version: 2
updates:
  - package-ecosystem: 'npm'
    # Single root entry — pnpm workspaces have one root lockfile; adding /packages/*
    # triggers per-subdir `misconfigured_tooling` errors ("Dependabot should only
    # update from the root workspace" — its own diagnostic) that accumulate and
    # flip the run conclusion to failure at container-exit, even though the root
    # scan still successfully creates PRs. Per-package devDeps (esbuild in
    # packages/{dev,terminal}) bump via `pnpm update -r` from the root scan; if a
    # future Dependabot updater drops -r, those bumps silently stop.
    # Reference failed run: 25276716316 (2026-05-03).
    directory: '/'
    schedule:
      interval: 'weekly'
      time: '06:00' # UTC; without this GitHub randomises the tick-time per docs
    open-pull-requests-limit: 5 # version-updates only (matches Dependabot's documented default); security-updates use the separate non-configurable 10-PR cap
    labels:
      - 'dependabot-autoskip'
    groups:
      production-deps:
        applies-to: security-updates
        dependency-type: production
      development-deps:
        applies-to: security-updates
        dependency-type: development
      production-version-deps:
        applies-to: version-updates
        dependency-type: production
      development-version-deps:
        applies-to: version-updates
        dependency-type: development
