version: 2
updates:
  - package-ecosystem: 'npm'
    directories:
      - '/'
      - '/packages/*'
    schedule:
      interval: 'weekly'
      time: '06:00' # UTC; without this GitHub randomises the tick-time per docs
    open-pull-requests-limit: 0 # security-only; no routine version updates yet
    labels:
      - 'dependabot-autoskip'
    groups:
      production-deps:
        applies-to: security-updates
        dependency-type: production
      development-deps:
        applies-to: security-updates
        dependency-type: development
