name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test
      - run: pnpm format:check

  advisory:
    name: Advisory checks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - run: pnpm build

      - name: Dead code (knip)
        run: pnpm knip

      - name: Package validation (publint)
        run: pnpm publint

      - name: Type resolution (attw)
        run: pnpm attw
