name: Socket Security

on:
  pull_request:
    branches: [main]
    paths:
      - 'pnpm-lock.yaml'
      - '**/package.json'

permissions:
  contents: read
  pull-requests: write

jobs:
  socket:
    name: Socket.dev dependency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: SocketDev/socket-sdk-js@v1
        with:
          action_type: report
