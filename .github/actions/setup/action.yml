name: Setup
description: Install pnpm, Node, and project dependencies

inputs:
  registry-url:
    description: npm registry URL — set to enable .npmrc auth via NODE_AUTH_TOKEN. Empty string (default) skips registry/auth config.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v5

    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: pnpm
        registry-url: ${{ inputs.registry-url }}

    - shell: bash
      run: pnpm install --frozen-lockfile
